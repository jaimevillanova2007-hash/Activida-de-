<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox - Guía Ninja</title>
    <link rel="stylesheet" href="flexbox.css">
</head>
<body>

    <h1>Flex</h1>

    <p>Dirección: <b>Row</b> (Fila)</p>
    <div class="contenedor row">
        <div class="caja"><img src="/terminal-soul/naruto" alt="Naruto"></div>
        <div class="caja"><img src="/terminal-soul/sasuke" alt="Sasuke"></div>
        <div class="caja"><img src="/terminal-soul/sakura" alt="Sakura"></div>
    </div>

    <p>Dirección: <b>Row-Reverse</b> (Fila al revés)</p>
    <div class="contenedor row-reverse">
        <div class="caja"><img src="/terminal-soul/gai" alt="Gai"></div>
        <div class="caja"><img src="/terminal-soul/images.jpeg" alt="Kakashi"></div>
        <div class="caja"><img src="/terminal-soul/minato" alt="Minato"></div>
    </div>

    <p>Dirección: <b>Column</b> (Columna)</p>
    <div class="contenedor column">
        <div class="caja"><img src="/terminal-soul/pain" alt="Pain"></div>
        <div class="caja"><img src="/terminal-soul/itachi" alt="Itachi"></div>
        <div class="caja"><img src="/terminal-soul/minato" alt="Minato"></div>
    </div>

    <p>Dirección: <b>Column-Reverse</b> (Columna al revés)</p>
    <div class="contenedor column-reverse">
        <div class="caja"><img src="/terminal-soul/minato" alt="Minato"></div>
        <div class="caja"><img src="/terminal-soul/naruto" alt="Naruto 1"></div>
        <div class="caja"><img src="/terminal-soul/naruto" alt="Naruto 2"></div>
    </div>



</body>
</html>
